name: deploy to amazon linux
on:  [workflow_dispatch]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
       - name: ssh into ec2 and run command
         uses: appleboy/ssh-action@master
         with:
           host: ${{ secrets.HOST }}
           username: ${{ secrets.USERNAME }}
           key: ${{ secrets.SSH_KEY }}
           script: |
             echo "---checking docker installing---"
             if ! [ -x "$(command -v docker)" ]; 
             then
               echo "docker ni mil rha... going to install"
               sudo yum update -y
               sudo systemctl start docker
               sudo systemctl enable docker 
               sudo usermod -a -G docker ec2-user
               newgrp docker <<EONG
             fi
             echo "---STARTING NGINX DEPLOYMENT--"
             sudo systemctl start docker
             sudo docker run -d --name my-web-server -p 80:80 nginx

             echo "---STATUS---"
             SUDO docker ps
               
          
