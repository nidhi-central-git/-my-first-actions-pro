name: deploy to amazon linux
on:  
  push:
    branches: [main]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
       - name: checkout code
         uses: actions/checkout@v4
       - name: login to dockerhub 
         uses: docker/login-action@v3
         with:
           username: ${{ secrets.DOCKER_USERNAME}}
           password: ${{ secrets.DOCKER_PASSWORD}}
       - name: build and push docker image
         uses: docker/build-push-action@v5
         with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-custom-nginx:latest
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
       - name: deploy to ec2
         uses: appleboy/ssh-action@master
         with:
           host: ${{ secrets.HOST }}
           username: ${{ secrets.USERNAME }}
           key: ${{ secrets.SSH_KEY }}
           script: |
             echo "going to stop my-web-server2"
             sudo docker stop my-web-server2 || true
             echo "going to remove my-web-server2"
             sudo docker rm my-web-user2 || true
             sudo docker rmi ${{ secrets.DOCKER_USERNAME }}/my-custom-nginx:latest || true
             
             sudo docker run -d --name my-web-server3 -p 80:80 ${{ secrets.DOCKER_USERNAME }}/my-custom-nginx:latest
             echo "checking status"
             sudo docker ps
             
               
          
