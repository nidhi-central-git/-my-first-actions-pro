name: deploy to amazon linux
on:  [workflow_dispatch]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
       - name: ssh into ec2 and run command
         uses: appleboy/ssh-action@master
         with:
           host: ${{ secrets.HOST }}
           username: ${{ secrets.USERNAME }}
           key: ${{ secrets.SSH_KEY }}
           script: |
             echo "main ab amazon linux server ke andar hu"
             uptime
             echo "docker status"
             docker --version
             echo "current directory"
             pwd

          
