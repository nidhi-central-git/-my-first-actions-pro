name: deploy to amazon linux
on:  
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
       - name: checkout code
         uses: actions/checkout@v4
       - name: copy index.html to ec2  
         uses: appleboy/scp-action@master
         with:
           host: ${{ secrets.HOST }}
           username: ${{ secrets.USERNAME }}
           key: ${{ secrets.SSH_KEY }}
           source: "index.html"
           target: "/home/ec2-user"
       - name: deploy nginx
         uses: appleboy/ssh-action@master
         with:
           host: ${{ secrets.HOST }}
           username: ${{ secrets.USERNAME }}
           key: ${{ secrets.SSH_KEY }}
           script: |
             echo "going to stop my-web-server"
             sudo docker stop my-web-server || true
             echo "going to remove my-web-server"
             sudo docker rm my-web-user || true
             echo "going to run an other web-server"
             sudo docker run -d --name my-web-server1 -p 80:80 -v /home/ec2-user/index.html:/usr/share/nginx/html/index.html nginx
             
               
          
