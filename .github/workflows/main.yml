
             
               
          
name: ci cd with ec2 deployments
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Stage
        uses: actions/checkout@v3
      - name: login to docker hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: build and push image
        run: |
          docker build -t nidjz2307/my-first-actions-pro:latest .
          docker push nidjz2307/my-first-actions-pro:latest
  deploy-to-dev:
    needs: build
    environment: development
    runs-on: ubuntu-latest
    steps:
      - name: deploying to dev server
        run: echo "deplloying to development envi"
  deploy-prod:
    needs: deploy-to-dev
    environment: production
    runs-on: self-hosted
    steps: 
     - name: pull and run on ec2
       run: |
          echo "connecting to ur amazon linux"
          sudo docker stop my-web-app3 || true
          sudo docker rm my-web-app3 || true
          sudo docker pull nidjz2307/my-first-actions-pro:latest
          sudo docker run -d --name my-web-app5 -p 80:80 nidjz2307/my-first-actions-pro:latest
          echo "deployment successful on ec2"
